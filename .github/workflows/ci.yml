name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.20
      - run: ruff check modular build_script.py
      - run: python build_script.py --check
