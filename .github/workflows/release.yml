name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.20
      - run: ruff check modular build_script.py
      - run: python build_script.py --check
      - name: Verify tag matches version
        run: |
          version=$(grep -oP '^\s*VERSION\s*=\s*"\K[^"]+' modular/globals.py | head -1)
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match v$version in globals.py"
            exit 1
          fi
          echo "Releasing v$version"
      - run: gh release create "$GITHUB_REF_NAME" smart_replays.py --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
